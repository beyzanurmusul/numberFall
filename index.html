<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumberFall Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    
    canvas {
      border: 3px solid #16c784;
      background: #0f3460;
      display: block;
      position: relative;
      z-index: 0;
    }
    
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .popup-content {
      background: #16213e;
      border: 3px solid #16c784;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      color: white;
      max-width: 500px;
    }
    
    .popup-content h2 {
      font-size: 2.5em;
      color: #16c784;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(22, 199, 132, 0.8);
    }
    
    .popup-content p {
      font-size: 1.2em;
      margin: 15px 0;
    }
    
    .examples {
      color: #00FF88;
      font-weight: bold;
    }
    
    .avoid {
      color: #FF6B6B;
      font-weight: bold;
    }
    
    .start-btn {
      background: #16c784;
      color: black;
      border: none;
      padding: 15px 40px;
      font-size: 1.2em;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
      transition: 0.3s;
    }
    
    .start-btn:hover {
      background: #00FF88;
      box-shadow: 0 0 20px rgba(22, 199, 132, 0.8);
    }
    
    .popup.hidden {
      display: none;
    }
    
    .photo-section {
      margin: 20px 0;
      border-top: 1px solid #16c784;
      padding-top: 20px;
    }
    
    .photo-label {
      color: #16c784;
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }
    
    .photo-button {
      background: #ff6b6b;
      margin-bottom: 10px;
    }
    
    .photo-button:hover {
      background: #ff5252;
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
    }
    
    #playerImage {
      display: none;
    }
    
    .photo-status {
      font-size: 12px;
      color: #16c784;
      margin-top: 10px;
    }
    
    
    #controlButtons {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      pointer-events: auto;
    }
    
    .control-btn {
      background: #16c784;
      color: black;
      border: 2px solid #16c784;
      padding: 10px 20px;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      margin-left: 10px;
      transition: 0.3s;
    }
    
    .control-btn:hover {
      background: #00FF88;
      box-shadow: 0 0 15px rgba(22, 199, 132, 0.8);
    }
    
    .control-btn.hidden {
      display: none;
    }
    
    .restart-btn {
      background: #ff6b6b;
      border: 2px solid #ff6b6b;
    }
    
    .restart-btn:hover {
      background: #ff5252;
      box-shadow: 0 0 15px rgba(255, 107, 107, 0.8);
    }
  </style>
</head>
<body>
   
  <div id="controlButtons">
    <button id="pauseButton" class="control-btn">⏸ PAUSE</button>
    <button id="resumeButton" class="control-btn hidden">▶ RESUME</button>
    <button id="restartButton" class="control-btn restart-btn hidden">🔄 RESTART</button>
  </div>
  
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  
  <input type="file" id="playerImage" accept="image/*">
  
  <div id="levelPopup" class="popup">
    <div class="popup-content">
      <h2 id="popupTitle">Level 1</h2>
      <p id="popupDescription">Catch ODD numbers</p>
      <p class="examples">
        ✅ Examples: <span id="popupExamples">1, 3, 5, 7...</span>
      </p>
      <p class="avoid">
        ❌ Avoid: <span id="popupAvoid">2, 4, 6, 8...</span>
      </p>
      
      <div class="photo-section">
        <label class="photo-label">Oyuncu Fotoğrafı Seç:</label>
        <button id="photoButton" class="start-btn photo-button">
          📸 Fotoğraf Seç
        </button>
        <p id="photoStatus" class="photo-status"></p>
      </div>
      
      <button id="startButton" class="start-btn">START ▶</button>
    </div>
  </div>
  
  <script src="game.js"></script>
</body>
</html>
